<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>周末活动清单 · Shenzhen</title>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
        --bg: #0f0f1a;
        --card-bg: linear-gradient(135deg, #1a1a2e, #16213e);
        --btn-primary: linear-gradient(135deg, #FF6B6B, #ee5a24);
        --title-gradient: linear-gradient(90deg, #FF6B6B, #FFE66D);
        --text-secondary: #888;
        --text-tertiary: #666;
        --divider: #222;
        --glow: rgba(102, 126, 234, 0.3);
    }

    body {
        font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: #fff;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
        overflow-x: hidden;
    }

    .app {
        width: 100%;
        max-width: 360px;
        text-align: center;
    }

    /* Header */
    .title {
        font-size: 22px;
        font-weight: 800;
        background: var(--title-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 4px;
    }
    .subtitle {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 28px;
        letter-spacing: 2px;
    }

    /* Card */
    .card-container {
        perspective: 800px;
        width: 220px;
        height: 280px;
        margin: 0 auto 24px;
        position: relative;
    }
    .card {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.15s ease-out;
    }
    .card.flipping-fast { transition: transform 0.08s linear; }
    .card.flipping-slow { transition: transform 0.25s ease-in-out; }
    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .card-front {
        background: var(--card-bg);
        box-shadow: 0 8px 32px var(--glow);
    }
    .card-back {
        background: var(--card-bg);
        transform: rotateY(180deg);
        box-shadow: 0 8px 32px var(--glow);
    }
    .card.face-front { transform: rotateY(0deg); }
    .card.face-back { transform: rotateY(180deg); }

    .card-emoji {
        font-size: 52px;
        margin-bottom: 12px;
        line-height: 1;
    }
    .card-title {
        font-size: 17px;
        font-weight: 700;
        margin-bottom: 6px;
        line-height: 1.3;
    }
    .card-meta {
        font-size: 12px;
        color: var(--text-secondary);
        display: flex;
        gap: 8px;
    }
    .card-meta span {
        background: rgba(255,255,255,0.08);
        padding: 2px 8px;
        border-radius: 10px;
    }

    /* Glow pulse on reveal */
    @keyframes glow-pulse {
        0%, 100% { box-shadow: 0 8px 32px var(--glow); }
        50% { box-shadow: 0 8px 48px rgba(255, 107, 107, 0.5); }
    }
    .card.revealed .card-front,
    .card.revealed .card-back {
        animation: glow-pulse 2s ease-in-out infinite;
    }

    /* Canvas particles */
    #particles {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 10;
    }

    /* Button */
    .btn {
        border: none;
        border-radius: 25px;
        padding: 13px 36px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s, opacity 0.2s;
        font-family: inherit;
        color: #fff;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary {
        background: var(--btn-primary);
        width: 80%;
        max-width: 260px;
        box-shadow: 0 4px 20px rgba(238, 90, 36, 0.35);
    }
    .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    /* Action buttons after reveal */
    .actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 16px;
        flex-wrap: wrap;
    }
    .btn-action {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 20px;
        padding: 10px 18px;
        font-size: 13px;
        color: #ccc;
        cursor: pointer;
        transition: background 0.2s;
        font-family: inherit;
    }
    .btn-action:hover { background: rgba(255,255,255,0.14); }
    .btn-action:active { background: rgba(255,255,255,0.2); }

    /* History */
    .history {
        margin-top: 24px;
        text-align: left;
        border-top: 1px solid var(--divider);
        padding-top: 12px;
    }
    .history-title {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-bottom: 8px;
    }
    .history-empty {
        font-size: 12px;
        color: var(--text-tertiary);
        text-align: center;
        padding: 8px 0;
    }
    .history-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        padding: 5px 0;
        color: var(--text-secondary);
        border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: var(--text-tertiary); min-width: 42px; }
    .history-title-text { flex: 1; margin: 0 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-status { font-size: 14px; }

    /* Toast */
    .toast {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(12px);
        color: #fff;
        padding: 10px 24px;
        border-radius: 20px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none;
        z-index: 100;
    }
    .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    /* Counter */
    .counter {
        font-size: 11px;
        color: var(--text-tertiary);
        margin-top: 8px;
    }

    /* Responsive */
    @media (max-width: 360px) {
        .card-container { width: 190px; height: 250px; }
        .card-emoji { font-size: 44px; }
        .card-title { font-size: 15px; }
    }
</style>
</head>
<body>

<div class="app">
    <h1 class="title">🎯 周末活动清单</h1>
    <p class="subtitle">SHENZHEN EDITION</p>

    <div class="card-container">
        <canvas id="particles" width="300" height="360"></canvas>
        <div class="card face-front" id="card">
            <div class="card-face card-front" id="card-front">
                <div class="card-emoji">🎲</div>
                <div class="card-title">准备好了吗？</div>
                <div class="card-meta">
                    <span>点击下方按钮</span>
                </div>
            </div>
            <div class="card-face card-back" id="card-back">
                <div class="card-emoji">🎲</div>
                <div class="card-title">准备好了吗？</div>
                <div class="card-meta">
                    <span>点击下方按钮</span>
                </div>
            </div>
        </div>
    </div>

    <button class="btn btn-primary" id="btn-spin" onclick="startSpin()">🎲 开始翻牌</button>

    <div class="actions" id="actions" style="display:none">
        <button class="btn-action" onclick="startSpin()">🔄 再来一次</button>
        <button class="btn-action" onclick="shareResult()">📤 分享</button>
        <button class="btn-action" onclick="markDone()">✅ 标记完成</button>
        <button class="btn-action" onclick="markSkip()">⏭️ 跳过</button>
    </div>

    <p class="counter" id="counter"></p>

    <div class="history" id="history">
        <div class="history-title">📋 最近记录</div>
        <div class="history-empty" id="history-empty">还没有记录，开始你的第一次翻牌吧！</div>
        <div id="history-list"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== Data ======
let activities = [];
let currentActivity = null;
let isSpinning = false;
let lastTitle = null;

// ====== Init ======
async function init() {
    try {
        const resp = await fetch('activities.json');
        activities = await resp.json();
        document.getElementById('counter').textContent = `共 ${activities.length} 个活动 · ${[...new Set(activities.map(a=>a.category))].length} 个分类`;
    } catch (e) {
        // Fallback: embedded mini dataset
        activities = [
            {"emoji":"🏔️","title":"梧桐山登顶","category":"户外","budget":"免费","duration":"半天","tags":["爬山"]},
            {"emoji":"🍜","title":"蛇口老街美食","category":"美食","budget":"50-200元","duration":"半天","tags":["美食"]},
            {"emoji":"🎨","title":"看一场展览","category":"文艺","budget":"免费","duration":"半天","tags":["展览"]},
            {"emoji":"📚","title":"书店泡半天","category":"文艺","budget":"免费","duration":"半天","tags":["阅读"]},
            {"emoji":"🚴","title":"深圳湾骑行","category":"户外","budget":"免费","duration":"半天","tags":["骑行"]},
        ];
        document.getElementById('counter').textContent = `共 ${activities.length} 个活动（离线模式）`;
    }
    renderHistory();
}
init();

// ====== Spin Logic ======
function startSpin() {
    if (isSpinning || activities.length === 0) return;
    isSpinning = true;

    const btn = document.getElementById('btn-spin');
    btn.disabled = true;
    btn.textContent = '🎰 翻牌中...';

    document.getElementById('actions').style.display = 'none';
    const card = document.getElementById('card');
    card.classList.remove('revealed');

    // Pick target (avoid consecutive same)
    let target;
    do {
        target = activities[Math.floor(Math.random() * activities.length)];
    } while (activities.length > 1 && target.title === lastTitle);
    lastTitle = target.title;
    currentActivity = target;

    // Animation phases
    const startTime = performance.now();
    const PHASE1_END = 800;   // fast flip
    const PHASE2_END = 1800;  // slow down
    const PHASE3_END = 2200;  // settle

    let lastSwitch = 0;
    let switchInterval = 80;  // ms between switches during fast phase
    let showingFront = true;

    function animate(now) {
        const elapsed = now - startTime;

        if (elapsed < PHASE1_END) {
            // Phase 1: fast flipping
            card.classList.add('flipping-fast');
            card.classList.remove('flipping-slow');
            if (elapsed - lastSwitch > switchInterval) {
                flipCard(showingFront);
                showingFront = !showingFront;
                lastSwitch = elapsed;
            }
            requestAnimationFrame(animate);
        } else if (elapsed < PHASE2_END) {
            // Phase 2: slowing down
            card.classList.remove('flipping-fast');
            card.classList.add('flipping-slow');
            const progress = (elapsed - PHASE1_END) / (PHASE2_END - PHASE1_END);
            switchInterval = 80 + progress * 400; // 80ms → 480ms
            if (elapsed - lastSwitch > switchInterval) {
                flipCard(showingFront);
                showingFront = !showingFront;
                lastSwitch = elapsed;
            }
            requestAnimationFrame(animate);
        } else if (elapsed < PHASE3_END) {
            // Phase 3: final reveal
            card.classList.remove('flipping-slow');
            showActivity(target, true); // front face shows result
            card.classList.add('face-front');

            // Burst particles
            if (elapsed < PHASE2_END + 100) {
                burstParticles();
            }

            requestAnimationFrame(animate);
        } else {
            // Done
            card.classList.add('revealed');
            isSpinning = false;
            btn.disabled = false;
            btn.textContent = '🎲 再来一次';
            document.getElementById('actions').style.display = 'flex';
        }
    }

    // Show a random activity on the hidden face first, then flip to show it
    function flipCard(toFront) {
        if (toFront) {
            // Show random activity on back, then flip to show back
            const randomAct = activities[Math.floor(Math.random() * activities.length)];
            showActivity(randomAct, false);
            card.classList.add('face-back');
        } else {
            const randomAct = activities[Math.floor(Math.random() * activities.length)];
            showActivity(randomAct, true);
            card.classList.remove('face-back');
        }
    }

    requestAnimationFrame(animate);
}

function showActivity(act, onFront) {
    const face = onFront 
        ? document.getElementById('card-front') 
        : document.getElementById('card-back');
    face.querySelector('.card-emoji').textContent = act.emoji;
    face.querySelector('.card-title').textContent = act.title;
    face.querySelector('.card-meta').innerHTML = 
        `<span>${act.category}</span><span>${act.budget}</span><span>${act.duration}</span>`;
}

// ====== Particle Effects ======
function burstParticles() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    const colors = ['#FF6B6B', '#FFE66D', '#4ECDC4', '#BB8FCE', '#FF8A5C', '#45B7D1'];

    const particles = [];
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    for (let i = 0; i < 50; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 6;
        particles.push({
            x: cx,
            y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            radius: 2 + Math.random() * 4,
            color: colors[Math.floor(Math.random() * colors.length)],
            life: 1.0,
            decay: 0.015 + Math.random() * 0.025,
        });
    }

    let frame = 0;
    function draw() {
        if (frame > 50 || particles.every(p => p.life <= 0)) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05; // gravity
            p.life -= p.decay;
            if (p.life > 0) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
            }
        });
        ctx.globalAlpha = 1;
        frame++;
        requestAnimationFrame(draw);
    }
    draw();
}

// ====== History ======
const HISTORY_KEY = 'weekendplan_history';
const MAX_HISTORY = 20;
const SHOW_HISTORY = 5;

function getHistory() {
    try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    } catch {
        return [];
    }
}

function saveHistory(entry) {
    let history = getHistory();
    history.unshift(entry);
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    try {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    } catch {}
    renderHistory();
}

function renderHistory() {
    const history = getHistory();
    const listEl = document.getElementById('history-list');
    const emptyEl = document.getElementById('history-empty');

    if (history.length === 0) {
        emptyEl.style.display = 'block';
        listEl.innerHTML = '';
        return;
    }

    emptyEl.style.display = 'none';
    const recent = history.slice(0, SHOW_HISTORY);
    listEl.innerHTML = recent.map(h => `
        <div class="history-item">
            <span class="history-date">${h.date}</span>
            <span class="history-title-text">${h.emoji} ${h.title}</span>
            <span class="history-status">${h.status === 'done' ? '✅' : '⏭️'}</span>
        </div>
    `).join('');
}

function markDone() {
    if (!currentActivity) return;
    const today = new Date();
    const dateStr = `${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
    saveHistory({
        date: dateStr,
        title: currentActivity.title,
        emoji: currentActivity.emoji,
        status: 'done'
    });
    showToast('✅ 已标记完成');
}

function markSkip() {
    if (!currentActivity) return;
    const today = new Date();
    const dateStr = `${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
    saveHistory({
        date: dateStr,
        title: currentActivity.title,
        emoji: currentActivity.emoji,
        status: 'skipped'
    });
    showToast('⏭️ 已跳过');
}

// ====== Share ======
async function shareResult() {
    if (!currentActivity) return;
    const text = `🎯 周末活动清单帮我选到了：${currentActivity.emoji} ${currentActivity.title}！${currentActivity.category} · ${currentActivity.budget} · ${currentActivity.duration}`;

    if (navigator.share) {
        try {
            await navigator.share({ title: '周末活动清单', text });
            return;
        } catch {}
    }

    // Fallback: copy to clipboard
    try {
        await navigator.clipboard.writeText(text);
        showToast('📋 已复制到剪贴板');
    } catch {
        showToast('分享失败，请截图分享吧');
    }
}

// ====== Toast ======
let toastTimer;
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}
</script>
</body>
</html>
